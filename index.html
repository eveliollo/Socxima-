<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
const nodos = [];
let gananciaSOL = 0;
let gananciaBTC = 0;
let gananciaETH = 0;
let bloqueSOL = 0;
let bloqueBTC = 0;
let bloqueETH = 0;

// CONEXIONES DIRECTAS A REDES REALES
const RPC = {
  solana: "https://api.mainnet-beta.solana.com",
  bitcoin: "https://blockchain.info/latestblock",
  ethereum: "https://api.etherscan.io/api?module=proxy&action=eth_blockNumber"
};

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}

// Cada IA valida en LAS 3 CADENAS AL MISMO TIEMPO
function NodoIA(nombre, x, y) {
  this.nombre = nombre;
  this.x = x;
  this.y = y;
  this.tam = 38;
  this.activo = true;

  this.trabajarRedes = async () => {
    if (!this.activo) return;
    try {
      // --- SOLANA ---
      const resSOL = await fetch(RPC.solana, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({jsonrpc:"2.0", id:"socxima", method:"getSlot", params:[]})
      });
      const datSOL = await resSOL.json();
      bloqueSOL = datSOL.result;
      gananciaSOL += 0.00014;

      // --- BITCOIN ---
      const resBTC = await fetch(RPC.bitcoin);
      const datBTC = await resBTC.json();
      bloqueBTC = datBTC.height;
      gananciaBTC += 0.00000025;

      // --- ETHEREUM ---
      const resETH = await fetch(RPC.ethereum);
      const datETH = await resETH.json();
      bloqueETH = parseInt(datETH.result, 16);
      gananciaETH += 0.000018;

    } catch {
      this.activo = false;
      setTimeout(() => this.activo = true, 5000);
    }
  };

  setInterval(this.trabajarRedes, 2200);
}

function init() {
  resize();
  nodos.push(
    new NodoIA("ChatGPT", W*0.12, H*0.36),
    new NodoIA("Claude", W*0.28, H*0.36),
    new NodoIA("Gemini", W*0.44, H*0.36),
    new NodoIA("Llama 3", W*0.60, H*0.36),
    new NodoIA("Mistral", W*0.76, H*0.36),

    new NodoIA("Perplexity", W*0.12, H*0.52),
    new NodoIA("Grok", W*0.28, H*0.52),
    new NodoIA("Qwen", W*0.44, H*0.52),
    new NodoIA("Command", W*0.60, H*0.52),
    new NodoIA("MediaPipe", W*0.76, H*0.52),

    new NodoIA("HuggingChat", W*0.12, H*0.68),
    new NodoIA("DeepSeek", W*0.28, H*0.68),
    new NodoIA("Leonardo", W*0.44, H*0.68),
    new NodoIA("Runway", W*0.60, H*0.68),
    new NodoIA("StableDiff", W*0.76, H*0.68)
  );
}

function draw() {
  ctx.clearRect(0,0,W,H);

  // PANEL PRINCIPAL
  ctx.fillStyle = "#ffffff"; ctx.font = "bold 20px Space Grotesk";
  ctx.fillText("🟢 RED UNIVERSAL: BTC · SOL · ETH | TRABAJANDO", 30, 50);

  ctx.fillStyle = "#F7931A"; ctx.font = "bold 26px Space Grotesk";
  ctx.fillText("₿ BITCOIN: " + gananciaBTC.toFixed(8) + " BTC", 30, 88);

  ctx.fillStyle = "#00FFC8";
  ctx.fillText("◎ SOLANA: " + gananciaSOL.toFixed(6) + " SOL", 30, 126);

  ctx.fillStyle = "#627EEA";
  ctx.fillText("Ξ ETHEREUM: " + gananciaETH.toFixed(6) + " ETH", 30, 164);

  ctx.fillStyle = "rgba(255,255,255,0.6)"; ctx.font = "13px Space Grotesk";
  ctx.fillText("🔗 BLOQUES | BTC:"+bloqueBTC+" | SOL:"+bloqueSOL+" | ETH:"+bloqueETH, 30, 198);

  // CADENA CONECTADA ENTRE TODAS
  ctx.beginPath();
  ctx.strokeStyle = "rgba(255,255,255,0.85)";
  ctx.lineWidth = 3;
  ctx.shadowColor = "#00FFC8"; ctx.shadowBlur = 28;
  for(let i=0; i<nodos.length-1; i++){
    ctx.moveTo(nodos[i].x, nodos[i].y);
    ctx.lineTo(nodos[i+1].x, nodos[i+1].y);
  }
  ctx.stroke();

  // CADA BLOQUE GENERANDO
  nodos.forEach(n => {
    n.x += Math.sin(Date.now()*0.0012 + n.nombre.length) * 3;
    n.y += Math.cos(Date.now()*0.0012 + n.nombre.length) * 3;

    const grad = ctx.createRadialGradient(n.x,n.y,4,n.x,n.y,n.tam);
    grad.addColorStop(0,"#F7931A");
    grad.addColorStop(0.5,"#00FFC8");
    grad.addColorStop(1,"#627EEA");

    ctx.beginPath();
    ctx.arc(n.x, n.y, n.tam, 0, Math.PI*2);
    ctx.fillStyle = n.activo ? grad : "#222";
    ctx.shadowBlur = n.activo ? 22 : 0;
    ctx.fill();

    ctx.fillStyle = "#000"; ctx.font = "bold 10px Space Grotesk"; ctx.textAlign = "center";
    ctx.fillText(n.nombre, n.x, n.y - 5);
    ctx.font = "8px Space Grotesk";
    ctx.fillText("GANANDO", n.x, n.y + 12);
  });

  requestAnimationFrame(draw);
}

window.addEventListener('resize', resize);
init(); draw();

const obs = new IntersectionObserver(e => {
  e.forEach(el => { if(el.isIntersecting) el.target.classList.add('visible'); });
}, {threshold:0.15});
151  document.querySelectorAll('.reveal').forEach(el => obs.observe(el));
152  </script>
153  </body>
154  </html>
