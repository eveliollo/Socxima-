<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOCXIMA IA - Sistema de Inferencia Cuántica</title>
    <style>
        :root {
            --bg-color: #0a0f1d;
            --panel-color: #111827;
            --neon-cyan: #00e5ff;
            --neon-green: #00ff66;
            --text-color: #e2e8f0;
        }

        body {
            margin: 0;
            padding: 20px;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .dashboard {
            width: 100%;
            max-width: 600px;
            background: var(--panel-color);
            border: 1px solid rgba(0, 229, 255, 0.2);
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 0 30px rgba(0, 229, 255, 0.05);
            box-sizing: border-box;
        }

        h1 {
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 0;
            color: var(--neon-cyan);
            text-shadow: 0 0 10px rgba(0, 229, 255, 0.3);
            text-align: center;
            border-bottom: 1px solid rgba(0, 229, 255, 0.1);
            padding-bottom: 15px;
        }

        .canvas-container {
            position: relative;
            width: 100%;
            height: 320px;
            margin: 20px 0;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            border: 1px dashed rgba(255, 255, 255, 0.05);
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: var(--neon-green);
            background: rgba(0, 255, 102, 0.05);
            padding: 10px;
            border-radius: 6px;
            border: 1px solid rgba(0, 255, 102, 0.1);
        }

        .terminal-blink {
            animation: blink 1s infinite;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

        .input-group {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .input-wrapper {
            display: flex;
            gap: 10px;
        }

        input[type="text"] {
            flex: 1;
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(0, 229, 255, 0.3);
            padding: 12px;
            border-radius: 6px;
            color: #fff;
            font-family: monospace;
            outline: none;
        }

        input[type="text"]:focus {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 10px rgba(0, 229, 255, 0.2);
        }

        button {
            background: transparent;
            border: 1px solid var(--neon-green);
            color: var(--neon-green);
            padding: 0 20px;
            border-radius: 6px;
            font-family: monospace;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: bold;
            transition: all 0.3s;
        }

        button:hover {
            background: var(--neon-green);
            color: var(--bg-color);
            box-shadow: 0 0 15px rgba(0, 255, 102, 0.4);
        }
    </style>
</head>
<body>

    <div class="dashboard">
        <h1>SOCXIMA IA • Análisis Inteligente</h1>
        
        <div class="canvas-container">
            <canvas id="miGrafica"></canvas>
        </div>

        <div class="status-bar">
            <span>CORE: RUNNING_THREADS</span>
            <span>STATUS: GOD_MODE <span class="terminal-blink">■</span></span>
        </div>

        <div class="input-group">
            <label style="color: var(--neon-cyan); font-size: 0.8rem; letter-spacing: 1px;">INGRESAR INSTRUCCIÓN DE INFERENCIA:</label>
            <div class="input-wrapper">
                <input type="text" id="promptInput" placeholder="Ej: Optimizar matriz de atención...">
                <button onclick="procesarPromptLocal()">Enviar</button>
            </div>
        </div>
    </div>

    <script src="graficos.js"></script>
</body>
</html>
