<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOCXIMA IA | Web3 Engine</title>
    <link rel="stylesheet" href="estilo.css">
</head>
<body>
    <div class="container">
        <h1>⚡ SOCXIMA IA</h1>
        <p class="subtitulo">Red Blockchain + Inteligencia Artificial</p>

        <div class="estado">
            <span class="activo">✅ Conectado a Termux</span>
            <span class="puerto">Puerto: 8000</span>
        </div>

        <div class="chat-box">
            <div id="historial">
                <div class="msg-sistema">Escribe tu consulta sobre saldos, bloques o seguridad...</div>
            </div>
        </div>

        <div class="input-area">
            <input type="text" id="mensaje" placeholder="Ej: ¿Cuál es el bloque actual?" onkeydown="if(event.key === 'Enter') enviar()">
            <button onclick="enviar()">ENVIAR</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
